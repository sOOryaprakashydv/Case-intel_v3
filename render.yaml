services:
  - type: web
    name: caseintel-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caseintel-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://caseintel-frontend.onrender.com"
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: MALWAREBAZAAR_API_KEY
        sync: false
      - key: CASEINTEL_API_KEY
        generateValue: true
      - key: ENV
        value: "production"

  - type: web
    name: caseintel-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://caseintel-backend.onrender.com"
      - key: NEXT_PUBLIC_API_KEY
        sync: false   # copy the CASEINTEL_API_KEY value from the backend service here

databases:
  - name: caseintel-db
    plan: free
